<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Registrar pago</title>
    <link rel="stylesheet" href="../css/estilos.css" />
  </head>
  <body class="app-body">
    <aside class="sidebar" id="sidebar-root"></aside>
    <div class="main-area">
      <header class="page-header">
        <h1>Registrar pago</h1>
        <p>Legalización de ingresos por concepto de matrícula y otros cargos financieros.</p>
      </header>

      <div class="card">
        <form id="form-pago" class="stack">
          <div class="gc-est-bubble" aria-labelledby="pg-est-bubble-title" style="margin-bottom: 1.5rem;">
            <h3 id="pg-est-bubble-title" class="gc-est-bubble-title">Seleccionar estudiante</h3>
            <p class="gc-est-bubble-hint">
              Busque y pulse una fila para cargar sus períodos y volantes.
            </p>
            <div class="form-group" style="margin-bottom: 0.75rem">
              <label for="pg-filtro-est">Buscar (filtra mientras escribe)</label>
              <input
                type="text"
                id="pg-filtro-est"
                autocomplete="off"
                placeholder="Nombre, apellido, carné, correo o programa"
              />
              <input type="hidden" id="pg-est" value="" />
            </div>
            <p id="pg-lbl-est" class="gc-est-lbl"></p>
            <div class="table-wrap mt-1 gc-est-scroll" style="max-height: 200px;">
              <table class="table-selectable">
                <thead>
                  <tr>
                    <th>Carné</th>
                    <th>Nombre</th>
                    <th>Apellido</th>
                    <th>Correo</th>
                    <th>Programa</th>
                  </tr>
                </thead>
                <tbody id="pg-tbl-est"></tbody>
              </table>
            </div>
          </div>
          <div class="form-group">
            <label for="pg-per">Período</label>
            <select id="pg-per" required></select>
          </div>
          <div class="form-group">
            <label for="pg-cod">Concepto de pago (Código Detalle)</label>
            <select id="pg-cod" required></select>
          </div>
          <div class="form-group">
            <label for="pg-med">Medio de pago</label>
            <select id="pg-med" required>
              <option value="">— Elija medio —</option>
              <option value="CAJA">CAJA</option>
              <option value="SIMULADO_ONLINE">SIMULADO_ONLINE</option>
            </select>
          </div>
          <div class="form-group">
            <label for="pg-ref">Referencia / voucher</label>
            <input type="text" id="pg-ref" placeholder="Ej. recibo físico u ID transacción" />
          </div>
          <div class="form-group">
            <label for="pg-val">Valor del pago</label>
            <input type="number" id="pg-val" min="1" step="1" required />
          </div>
          <div id="pg-err" class="alert alert-error" hidden role="alert"></div>
          <button type="submit" class="btn btn-primary">Registrar pago</button>
        </form>
      </div>
    </div>
    <div id="toast-stack"></div>
    <script>
      window.__IS_PAGE__ = true;
    </script>
    <script src="../js/api.js?t=1715200000"></script>
    <script src="../js/auth.js?t=1715200000"></script>
    <script>
      auth.initPage({ perm: "REGISTRAR_PAGO", activeFile: "registrar-pago.html" });
    </script>
    <script src="../js/pagos.js?t=1715200000"></script>
  </body>
</html>

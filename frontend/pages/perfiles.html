<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Perfiles (Roles) | Gestión Estudiantil</title>
    <link rel="stylesheet" href="../css/estilos.css" />
  </head>
  <body class="app-body">
    <aside class="sidebar" id="sidebar-root"></aside>
    <div class="main-area">
      <header class="page-header">
        <h1>Gestión de Perfiles y Roles</h1>
        <p>Defina los niveles de acceso y asocie permisos a cada perfil.</p>
      </header>

      <div class="grid-2">
        <div class="card">
          <h2>Perfiles</h2>
          <form id="form-perfil" class="btn-row mb-1">
            <input type="text" id="p-nombre" placeholder="Nombre del perfil (ej. AUDITOR)" required />
            <button type="submit" class="btn btn-primary">Crear</button>
          </form>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Nombre</th>
                  <th class="text-center">Acciones</th>
                </tr>
              </thead>
              <tbody id="tbl-perfiles"></tbody>
            </table>
          </div>
        </div>

        <div class="card">
          <h2>Permisos del Perfil</h2>
          <p id="p-sel-info" class="text-muted" style="font-size: 0.85rem">Seleccione un perfil para gestionar sus permisos.</p>
          <div id="permisos-cont" style="display: none">
            <div class="stack" id="lista-permisos" style="max-height: 400px; overflow-y: auto; padding: 0.5rem; border: 1px solid var(--border); border-radius: var(--radius-sm)">
              <!-- Checkboxes here -->
            </div>
            <button type="button" class="btn btn-secondary mt-1" id="btn-save-permisos">Guardar Permisos</button>
          </div>
        </div>
      </div>
    </div>

    <div id="toast-stack"></div>
    <script>window.__IS_PAGE__ = true;</script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script>
      auth.initPage({ perm: "GESTIONAR_PERFILES", activeFile: "perfiles.html" });

      let currentPerfilId = null;
      let originalPermisos = [];   // IDs del perfil seleccionado antes de editar
      let todosPermisos = [];      // Catálogo completo de permisos
      let todosMenus = [];         // Catálogo de menús (para mostrar nombre del menú)

      async function cargar() {
        const perfiles = await api.getPerfiles();
        const tb = document.getElementById("tbl-perfiles");
        tb.innerHTML = "";
        perfiles.forEach(p => {
          const tr = document.createElement("tr");
          tr.style.cursor = "pointer";
          tr.onclick = () => seleccionarPerfil(p.id_perfil, p.nombre_perfil, p.permisos || []);
          tr.innerHTML = `
            <td>${p.id_perfil}</td>
            <td><strong>${p.nombre_perfil}</strong></td>
            <td class="text-center">
              <button class="btn btn-small btn-danger" onclick="event.stopPropagation(); eliminarPerfil(${p.id_perfil}, '${p.nombre_perfil}')">🗑️</button>
            </td>
          `;
          tb.appendChild(tr);
        });
      }

      async function seleccionarPerfil(id, nombre, permisosActuales) {
        currentPerfilId = id;
        originalPermisos = [...permisosActuales];

        document.getElementById("p-sel-info").innerHTML =
          `Gestionando permisos para: <strong>${nombre}</strong>`;
        document.getElementById("permisos-cont").style.display = "block";

        // Cargar catálogos si no están
        if (!todosPermisos.length) {
          todosPermisos = await api.getPermisos();
        }
        if (!todosMenus.length) {
          todosMenus = await api.getMenus();
        }

        // Nombres amigables para los permisos (complementa la descripción técnica)
        const PERM_NOMBRES = {
          'VER_USUARIOS':          'Ver usuarios',
          'CREAR_USUARIO':         'Crear usuario',
          'EDITAR_USUARIO':        'Editar usuario',
          'ELIMINAR_USUARIO':      'Eliminar usuario',
          'GESTIONAR_USUARIOS':    'Gestionar usuarios',
          'GESTIONAR_PERFILES':    'Gestionar perfiles / roles',
          'GESTIONAR_MENUS':       'Gestionar menús',
          'GESTIONAR_PROGRAMAS':   'Programas y planes de estudio',
          'GESTIONAR_ASIGNATURAS': 'Asignaturas (catálogo)',
          'GESTIONAR_PERIODOS':    'Periodos académicos',
          'GESTIONAR_ESTUDIANTES': 'Estudiantes',
          'GESTIONAR_REGLAS':      'Reglas de cobro',
          'GESTIONAR_CODIGOS':     'Códigos de detalle',
          'GENERAR_COBRO_IND':     'Generar cobro individual',
          'COBROS_ADICIONALES':    'Cobros adicionales',
          'GENERAR_COBRO_MAS':     'Cobro masivo',
          'REGISTRAR_PAGO':        'Registrar pago',
          'VER_CUENTA':            'Cuenta corriente',
          'CONSULTAR_PAGOS':       'Consultar pagos',
          'VER_REPORTES':          'Ver reportes',
        };

        const cont = document.getElementById("lista-permisos");
        cont.innerHTML = "";

        todosPermisos.forEach(p => {
          const checked = originalPermisos.includes(p.id_permiso) ? "checked" : "";
          const label = PERM_NOMBRES[p.nombre_operacion] || p.nombre_operacion;
          const div = document.createElement("div");
          div.className = "check-row";
          div.innerHTML = `
            <input type="checkbox" id="perm-${p.id_permiso}" value="${p.id_permiso}" ${checked}>
            <div class="check-body">
              <label for="perm-${p.id_permiso}"><strong>${label}</strong></label>
              <div style="font-size:0.75rem; color:var(--text-muted)">
                ${p.descripcion || ''} &nbsp;·&nbsp; <code style="font-size:0.72rem">${p.nombre_operacion}</code>
              </div>
            </div>
          `;
          cont.appendChild(div);
        });
      }

      window.eliminarPerfil = async (id, nom) => {
        if (!await auth.showConfirm(`¿Seguro que desea eliminar el perfil ${nom}?`)) return;
        await api.deletePerfil(id);
        auth.showToast("Perfil eliminado.");
        if (currentPerfilId === id) {
          currentPerfilId = null;
          document.getElementById("permisos-cont").style.display = "none";
        }
        cargar();
      };

      document.getElementById("form-perfil").addEventListener("submit", async (e) => {
        e.preventDefault();
        const nom = document.getElementById("p-nombre").value.trim();
        await api.postPerfil({ nombre_perfil: nom });
        auth.showToast("Perfil creado.");
        e.target.reset();
        cargar();
      });

      document.getElementById("btn-save-permisos").onclick = async () => {
        if (!currentPerfilId) return;
        const checkboxes = document.querySelectorAll("#lista-permisos input[type=checkbox]");
        const nuevoPermisos = [];
        checkboxes.forEach(cb => {
          if (cb.checked) nuevoPermisos.push(Number(cb.value));
        });

        const agregar = nuevoPermisos.filter(id => !originalPermisos.includes(id));
        const quitar  = originalPermisos.filter(id => !nuevoPermisos.includes(id));

        try {
          // Asignar nuevos permisos
          for (const id of agregar) {
            await api.postPerfilPermiso(currentPerfilId, id);
          }
          // Remover permisos desmarcados
          for (const id of quitar) {
            await api.deletePerfilPermiso(currentPerfilId, id);
          }
          originalPermisos = [...nuevoPermisos];
          auth.showToast(`Permisos actualizados (${agregar.length} asignados, ${quitar.length} removidos).`);
        } catch (err) {
          auth.showToast("Error al guardar permisos: " + err.message);
        }
      };

      cargar();
    </script>
  </body>
</html>
